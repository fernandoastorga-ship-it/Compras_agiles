services:
  - type: web
    name: compras-agiles
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: compras-agiles-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false
      - key: MAX_FILE_BYTES
        value: "10485760"
      - key: MAX_PURCHASE_FILES_BYTES
        value: "31457280"

databases:
  - name: compras-agiles-db
    databaseName: compras_agiles
    user: compras_agiles
    plan: basic-1gb
